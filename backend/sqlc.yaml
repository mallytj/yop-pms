version: "2"
sql:
  - engine: "postgresql"
    queries:
      - "./internal/adapters/postgresql/sqlc/queries"
    schema: "./internal/adapters/postgresql/migrations"
    gen:
      go:
        package: "repo"
        out: "./internal/adapters/postgresql/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true # generate Querier interface
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type: "github.com/google/uuid.NullUUID"
