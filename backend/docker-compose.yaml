services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel_pms_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: hotel_pms
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - hotel-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: hotel_pms_admin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - hotel-network
volumes:
  pgdata:

networks:
  hotel-network:
    driver: bridge