name: Audit
on: [push, pull_request]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
      - name: Install Dependencies
        run: go mod download
      - name: golangci-lint
        uses: golangci-lint/golangci-lint-action@v6
        with:
          version: v1.64 # Specify a version to ensure deterministic builds
      - name: Run Audit
        run: make audit-no-golangci
