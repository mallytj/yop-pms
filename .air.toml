root = "."
tmp_dir = "tmp"

[build]
  # Point to your new cmd/server path
  cmd = "go build -o ./tmp/main ./cmd/server/main.go"
  bin = "./tmp/main"
  full_bin = "APP_ENV=dev ./tmp/main"
  # Watch internal and cmd, but NOT web or migrations
  include_dir = ["cmd", "internal"]
  exclude_dir = ["web", "bin", "tmp", "docs", "migrations"]
  include_ext = ["go", "sql"]
  delay = 1000 # Give it a second to "settle"
  stop_on_error = true
  log = "air_errors.log"

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"