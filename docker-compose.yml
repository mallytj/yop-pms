services:
  postgres:
    image: postgres:18-alpine
    container_name: yop_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - yop_network

  # Database manager GUI
  adminer:
    image: adminer:latest
    container_name: yop_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - yop_network

  redis:
    image: redis:7-alpine
    container_name: yop_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yop_network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: yop_redis_commander
    environment:
      - REDIS_HOSTS=local:yop_redis:6379:0:${REDIS_PASSWORD}
    ports:
      - "8082:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - yop_network

volumes:
  pgdata:
  redis_data:

networks:
  yop_network:
    driver: bridge
