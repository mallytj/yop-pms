basePath: /v1
definitions:
  cmd_server.HealthResponse:
    properties:
      message:
        example: Server is running
        type: string
      services:
        additionalProperties:
          $ref: '#/definitions/cmd_server.ServiceHealth'
        type: object
      status:
        example: ok
        type: string
      version:
        example: 1.0.0
        type: string
    type: object
  cmd_server.ServiceHealth:
    properties:
      error:
        type: string
      latency:
        example: 5ms
        type: string
      status:
        example: ok
        type: string
    type: object
  github_com_lexxcode1_yop-pms_internal_platform_apierror.APIError:
    properties:
      code:
        enum:
        - NOT_FOUND
        - BAD_REQUEST
        - CONFLICT
        - INTERNAL_ERROR
        - UNPROCESSABLE_ENTITY
        type: string
      message:
        type: string
      suggestions:
        items:
          type: string
        type: array
    type: object
  github_com_lexxcode1_yop-pms_internal_platform_types.ISO8601Date:
    properties:
      time.Time:
        type: string
    type: object
  internal_booking.CancellationIntent:
    properties:
      cancelled_by_user_id:
        type: string
      fee_override_reason:
        example: Loyalty member
        type: string
      fee_pence:
        example: 5000
        type: integer
      reason_code:
        example: guest_request
        type: string
      refund_action:
        allOf:
        - $ref: '#/definitions/internal_booking.RefundAction'
        example: original
      waive_fee:
        example: false
        type: boolean
    type: object
  internal_booking.CreateReservationInput:
    type: object
  internal_booking.GuestInlinePayload:
    properties:
      email:
        example: jane.doe@example.com
        type: string
      first_name:
        example: Jane
        type: string
      id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      last_name:
        example: Doe
        type: string
      phone:
        example: "+441234567890"
        type: string
    type: object
  internal_booking.GuestResponse:
    properties:
      email:
        example: jane@example.com
        type: string
      first_name:
        example: Jane
        type: string
      id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      last_name:
        example: Doe
        type: string
      phone:
        example: "+441234567890"
        type: string
      property_id:
        type: string
    type: object
  internal_booking.ItemResponse:
    properties:
      adults_count:
        example: 2
        type: integer
      assigned_room_id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      base_rate_pence:
        example: 15000
        type: integer
      booked_room_type_id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      children_count:
        example: 0
        type: integer
      created_at:
        type: string
      deleted_at:
        type: string
      do_not_move:
        example: false
        type: boolean
      guest_id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      property_id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      rate_plan_id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      reservation_id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      status:
        allOf:
        - $ref: '#/definitions/internal_booking.ItemStatus'
        example: booked
      stay_period:
        type: string
      updated_at:
        type: string
      version:
        example: 1
        type: integer
    type: object
  internal_booking.ItemStatus:
    enum:
    - booked
    - checked_in
    - checked_out
    - no_show
    - overstay
    - cancelled
    - archived
    type: string
    x-enum-varnames:
    - ItemStatusBooked
    - ItemStatusCheckedIn
    - ItemStatusCheckedOut
    - ItemStatusNoShow
    - ItemStatusOverstay
    - ItemStatusCancelled
    - ItemStatusArchived
  internal_booking.RefundAction:
    enum:
    - none
    - original
    - credit
    type: string
    x-enum-varnames:
    - RefundNone
    - RefundOriginal
    - RefundCredit
  internal_booking.ReservationResponse:
    properties:
      cancellation_intent:
        $ref: '#/definitions/internal_booking.CancellationIntent'
      code:
        example: RES-111213
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      expires_at:
        type: string
      group_id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      guest:
        $ref: '#/definitions/internal_booking.GuestResponse'
      id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      items:
        items:
          $ref: '#/definitions/internal_booking.ItemResponse'
        type: array
      notes:
        example: Guest requested top floor
        type: string
      primary_guest_id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      property_id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      sequential:
        example: 42
        type: integer
      source:
        allOf:
        - $ref: '#/definitions/internal_booking.ReservationSource'
        example: internal
      status:
        allOf:
        - $ref: '#/definitions/internal_booking.ReservationStatus'
        example: hold
      stay_period_envelope:
        type: string
      travel_agent_id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      updated_at:
        type: string
      version:
        example: 1
        type: integer
    type: object
  internal_booking.ReservationSource:
    enum:
    - website
    - internal
    - ota
    type: string
    x-enum-varnames:
    - SourceWebsite
    - SourceInternal
    - SourceOTA
  internal_booking.ReservationStatus:
    enum:
    - hold
    - confirmed
    - checked_in
    - checked_out
    - pending_cancellation
    - cancelled
    - archived
    type: string
    x-enum-varnames:
    - StatusHold
    - StatusConfirmed
    - StatusCheckedIn
    - StatusCheckedOut
    - StatusPendingCancellation
    - StatusCancelled
    - StatusArchived
host: localhost:8080
info:
  contact: {}
  description: This is the backend API documentation for Yop PMS.
  title: Yop PMS Backend API
  version: "1.0"
paths:
  /healthz:
    get:
      description: Check if the server, database, and redis are alive
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cmd_server.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/cmd_server.HealthResponse'
      summary: Get Server Health
      tags:
      - System
  /v1/reservations:
    get:
      description: Cursor-paginated list of reservations for the property.
      parameters:
      - description: Property UUID
        in: header
        name: X-Property-ID
        required: true
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Page size (default 50)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_booking.ReservationResponse'
            type: array
        "400":
          description: Invalid X-Property-ID or query params
          schema:
            $ref: '#/definitions/github_com_lexxcode1_yop-pms_internal_platform_apierror.APIError'
      summary: List reservations
      tags:
      - Reservations
    post:
      consumes:
      - application/json
      description: Create a new reservation with one or more room items.
      parameters:
      - description: Property UUID
        in: header
        name: X-Property-ID
        required: true
        type: string
      - description: Reservation payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_booking.CreateReservationInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_booking.ReservationResponse'
        "400":
          description: Invalid request body or X-Property-ID
          schema:
            $ref: '#/definitions/github_com_lexxcode1_yop-pms_internal_platform_apierror.APIError'
        "409":
          description: Resource conflict (e.g. duplicate, version mismatch)
          schema:
            $ref: '#/definitions/github_com_lexxcode1_yop-pms_internal_platform_apierror.APIError'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/github_com_lexxcode1_yop-pms_internal_platform_apierror.APIError'
        "501":
          description: Feature not implemented
          schema:
            $ref: '#/definitions/github_com_lexxcode1_yop-pms_internal_platform_apierror.APIError'
      summary: Create reservation
      tags:
      - Reservations
  /v1/reservations/{id}:
    get:
      description: Fetch a single reservation by ID.
      parameters:
      - description: Property UUID
        in: header
        name: X-Property-ID
        required: true
        type: string
      - description: Reservation UUID
        in: path
        name: id
        required: true
        type: string
      - description: 'Comma-separated: items,guest,none'
        in: query
        name: include
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_booking.ReservationResponse'
        "400":
          description: Invalid ID or X-Property-ID
          schema:
            $ref: '#/definitions/github_com_lexxcode1_yop-pms_internal_platform_apierror.APIError'
        "404":
          description: Reservation not found
          schema:
            $ref: '#/definitions/github_com_lexxcode1_yop-pms_internal_platform_apierror.APIError'
      summary: Get reservation
      tags:
      - Reservations
  /v1/sse:
    get:
      description: Opens a Server-Sent Events stream for real-time updates
      parameters:
      - description: Property UUID from authenticated session
        in: header
        name: X-Property-ID
        required: true
        type: string
      - description: Property UUID (must match authenticated session)
        in: query
        name: property_id
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE event stream — one ChangeEvent per line
        "400":
          description: property_id query parameter is required or invalid UUID
          schema:
            $ref: '#/definitions/github_com_lexxcode1_yop-pms_internal_platform_apierror.APIError'
        "401":
          description: No authenticated session
          schema:
            $ref: '#/definitions/github_com_lexxcode1_yop-pms_internal_platform_apierror.APIError'
        "403":
          description: Property access denied
          schema:
            $ref: '#/definitions/github_com_lexxcode1_yop-pms_internal_platform_apierror.APIError'
        "503":
          description: SSE at capacity
          schema:
            $ref: '#/definitions/github_com_lexxcode1_yop-pms_internal_platform_apierror.APIError'
      summary: Subscribe to real-time SSE events
      tags:
      - Realtime
swagger: "2.0"
