            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "404":
          description: Item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "409":
          description: Version mismatch or before arrival
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
  "/v1/reservations/{id}/reactivate":
    post:
      description: Restore a cancelled reservation to confirmed, reactivate items and
        inventory.
      tags:
        - Reservations
      summary: Reactivate cancelled reservation
      parameters:
        - description: Property UUID
          name: X-Property-ID
          in: header
          required: true
          schema:
            type: string
        - description: Reservation UUID
          name: id
          in: path
          required: true
          schema:
            type: string
        - description: Version for optimistic concurrency
          name: If-Match
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/internal_booking.ReservationResponse"
        "400":
          description: Invalid ID or X-Property-ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "404":
          description: Reservation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "409":
          description: Version mismatch or invalid transition or past reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
  /v1/sse:
    get:
      description: Opens a Server-Sent Events stream for real-time updates
      tags:
        - Realtime
      summary: Subscribe to real-time SSE events
      parameters:
        - description: Property UUID from authenticated session
          name: X-Property-ID
          in: header
          required: true
          schema:
            type: string
        - description: Property UUID (must match authenticated session)
          name: property_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE event stream — one ChangeEvent per line
        "400":
          description: property_id query parameter is required or invalid UUID
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "401":
          description: No authenticated session
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "403":
          description: Property access denied
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "503":
          description: SSE at capacity
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
servers:
  - url: //localhost:8080/v1
components:
  requestBodies:
    internal_booking.CancelInput:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/internal_booking.CancelInput"
      description: Cancellation details
      required: true
  schemas:
    cmd_server.HealthResponse:
      type: object
      properties:
        message:
          type: string
          example: Server is running
        services:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/cmd_server.ServiceHealth"
        status:
          type: string
          example: ok
        version:
          type: string
          example: 1.0.0
    cmd_server.ServiceHealth:
      type: object
      properties:
        error:
          type: string
        latency:
          type: string
          example: 5ms
        status:
          type: string
          example: ok
    github_com_lexxcode1_yop-pms_internal_platform_apierror.APIError:
      type: object
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
            - BAD_REQUEST
            - CONFLICT
            - INTERNAL_ERROR
            - UNPROCESSABLE_ENTITY
        message:
          type: string
        suggestions:
          type: array
          items:
            type: string
    github_com_lexxcode1_yop-pms_internal_platform_types.ISO8601Date:
      type: object
      properties:
        time.Time:
          type: string
    internal_booking.AddItemInput:
      type: object
    internal_booking.AssignRoomInput:
      type: object
      properties:
        override_dnm_reason:
          type: string
          example: Guest insists on room 101
        room_id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
    internal_booking.BatchError:
      type: object
      properties:
        code:
          type: string
          example: ROOM_UNAVAILABLE
        message:
          type: string
          example: Room not available on selected dates
    internal_booking.BatchResult:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/internal_booking.BatchResultItem"
    internal_booking.BatchResultItem:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/internal_booking.BatchError"
        item_id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
        reservation_item:
          $ref: "#/components/schemas/internal_booking.ItemResponse"
        status:
          description: '"ok" | "failed"'
          type: string
          example: ok
    internal_booking.CancelInput:
      type: object
      properties:
        fee_override_reason:
          type: string
          example: Loyalty member
        fee_pence:
          type: integer
          example: 5000
        reason_code:
          type: string
          example: guest_request
        refund_action:
          allOf:
            - $ref: "#/components/schemas/internal_booking.RefundAction"
          example: original
        shorten_stay:
          description: force-cancel checked-in items (requires
            reservations:post_checkin_mutate)
          type: boolean
          example: false
        waive_fee:
          type: boolean
          example: false
    internal_booking.CancellationIntent:
      type: object
      properties:
        cancelled_by_user_id:
          type: string
        fee_override_reason:
          type: string
          example: Loyalty member
        fee_pence:
          type: integer
          example: 5000
        reason_code:
          type: string
          example: guest_request
        refund_action:
          allOf:
            - $ref: "#/components/schemas/internal_booking.RefundAction"
          example: original
        waive_fee:
