openapi: 3.0.0
info:
  description: This is the backend API documentation for Yop PMS.
  title: Yop PMS Backend API
  contact: {}
  version: "1.0"
paths:
  /healthz:
    get:
      description: Check if the server, database, and redis are alive
      tags:
        - System
      summary: Get Server Health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cmd_server.HealthResponse"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cmd_server.HealthResponse"
  /v1/reservations:
    get:
      description: Cursor-paginated list of reservations for the property.
      tags:
        - Reservations
      summary: List reservations
      parameters:
        - description: Property UUID
          name: X-Property-ID
          in: header
          required: true
          schema:
            type: string
        - description: Filter by status
          name: status
          in: query
          schema:
            type: string
        - description: Page size (default 50)
          name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/internal_booking.ReservationResponse"
        "400":
          description: Invalid X-Property-ID or query params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
    post:
      description: Create a new reservation with one or more room items.
      tags:
        - Reservations
      summary: Create reservation
      parameters:
        - description: Property UUID
          name: X-Property-ID
          in: header
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/internal_booking.CreateReservationInput"
        description: Reservation payload
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/internal_booking.ReservationResponse"
        "400":
          description: Invalid request body or X-Property-ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "409":
          description: Resource conflict (e.g. duplicate, version mismatch)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "501":
          description: Feature not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
  /v1/reservations/availability:
    get:
      description: Check date-range availability for a room type.
      tags:
        - Reservations
      summary: Check room type availability
      parameters:
        - description: Property UUID
          name: X-Property-ID
          in: header
          required: true
          schema:
            type: string
        - description: Room type UUID
          name: room_type_id
          in: query
          required: true
          schema:
            type: string
        - description: Start date (YYYY-MM-DD)
          name: start_date
          in: query
          required: true
          schema:
            type: string
        - description: End date (YYYY-MM-DD)
          name: end_date
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/internal_booking.DateAvailability"
        "400":
          description: Invalid query params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
  "/v1/reservations/{id}":
    get:
      description: Fetch a single reservation by ID.
      tags:
        - Reservations
      summary: Get reservation
      parameters:
        - description: Property UUID
          name: X-Property-ID
          in: header
          required: true
          schema:
            type: string
        - description: Reservation UUID
          name: id
          in: path
          required: true
          schema:
            type: string
        - description: "Comma-separated: items,guest,none"
          name: include
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/internal_booking.ReservationResponse"
        "400":
          description: Invalid ID or X-Property-ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "404":
          description: Reservation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
    patch:
      description: "Patch reservation-level fields: notes, travel_agent_id, group_id,
        primary_guest_id."
      tags:
        - Reservations
      summary: Update reservation metadata
      parameters:
        - description: Property UUID
          name: X-Property-ID
          in: header
          required: true
          schema:
            type: string
        - description: Reservation UUID
          name: id
          in: path
          required: true
          schema:
            type: string
        - description: Version for optimistic concurrency
          name: If-Match
          in: header
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/internal_booking.UpdateMetadataInput"
        description: Fields to update
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/internal_booking.ReservationResponse"
        "400":
          description: Invalid ID or X-Property-ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "404":
          description: Reservation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "409":
          description: Version mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
