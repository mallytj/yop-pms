openapi: 3.0.0
info:
  description: This is the backend API documentation for Yop PMS.
  title: Yop PMS Backend API
  contact: {}
  version: "1.0"
paths:
  /healthz:
    get:
      description: Check if the server, database, and redis are alive
      tags:
        - System
      summary: Get Server Health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cmd_server.HealthResponse"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cmd_server.HealthResponse"
servers:
  - url: //localhost:8080/v1
components:
  schemas:
    cmd_server.HealthResponse:
      type: object
      properties:
        message:
          type: string
          example: Server is running
        services:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/cmd_server.ServiceHealth"
        status:
          type: string
          example: ok
        version:
          type: string
          example: 1.0.0
    cmd_server.ServiceHealth:
      type: object
      properties:
        error:
          type: string
        latency:
          type: string
          example: 5ms
        status:
          type: string
          example: ok
