openapi: 3.0.0
info:
  description: This is the backend API documentation for Yop PMS.
  title: Yop PMS Backend API
  contact: {}
  version: "1.0"
paths:
  /healthz:
    get:
      description: Check if the server, database, and redis are alive
      tags:
        - System
      summary: Get Server Health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cmd_server.HealthResponse"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cmd_server.HealthResponse"
  /v1/reservations:
    get:
      description: Cursor-paginated list of reservations for the property.
      tags:
        - Reservations
      summary: List reservations
      parameters:
        - description: Property UUID
          name: X-Property-ID
          in: header
          required: true
          schema:
            type: string
        - description: Filter by status
          name: status
          in: query
          schema:
            type: string
        - description: Page size (default 50)
          name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/internal_booking.ReservationResponse"
        "400":
          description: Invalid X-Property-ID or query params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
    post:
      description: Create a new reservation with one or more room items.
      tags:
        - Reservations
      summary: Create reservation
      parameters:
        - description: Property UUID
          name: X-Property-ID
          in: header
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/internal_booking.CreateReservationInput"
        description: Reservation payload
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/internal_booking.ReservationResponse"
        "400":
          description: Invalid request body or X-Property-ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "409":
          description: Resource conflict (e.g. duplicate, version mismatch)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "501":
          description: Feature not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
  "/v1/reservations/{id}":
    get:
      description: Fetch a single reservation by ID.
      tags:
        - Reservations
      summary: Get reservation
      parameters:
        - description: Property UUID
          name: X-Property-ID
          in: header
          required: true
          schema:
            type: string
        - description: Reservation UUID
          name: id
          in: path
          required: true
          schema:
            type: string
        - description: "Comma-separated: items,guest,none"
          name: include
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/internal_booking.ReservationResponse"
        "400":
          description: Invalid ID or X-Property-ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "404":
          description: Reservation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
  /v1/sse:
    get:
      description: Opens a Server-Sent Events stream for real-time updates
      tags:
        - Realtime
      summary: Subscribe to real-time SSE events
      parameters:
        - description: Property UUID from authenticated session
          name: X-Property-ID
          in: header
          required: true
          schema:
            type: string
        - description: Property UUID (must match authenticated session)
          name: property_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE event stream — one ChangeEvent per line
        "400":
          description: property_id query parameter is required or invalid UUID
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "401":
          description: No authenticated session
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "403":
          description: Property access denied
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
        "503":
          description: SSE at capacity
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/github_com_lexxcode1_yop-pms_internal_platform_apie\
                  rror.APIError"
servers:
  - url: //localhost:8080/v1
components:
  schemas:
    cmd_server.HealthResponse:
      type: object
      properties:
        message:
          type: string
          example: Server is running
        services:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/cmd_server.ServiceHealth"
        status:
          type: string
          example: ok
        version:
          type: string
          example: 1.0.0
    cmd_server.ServiceHealth:
      type: object
      properties:
        error:
          type: string
        latency:
          type: string
          example: 5ms
        status:
          type: string
          example: ok
    github_com_lexxcode1_yop-pms_internal_platform_apierror.APIError:
      type: object
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
            - BAD_REQUEST
            - CONFLICT
            - INTERNAL_ERROR
            - UNPROCESSABLE_ENTITY
        message:
          type: string
        suggestions:
          type: array
          items:
            type: string
    github_com_lexxcode1_yop-pms_internal_platform_types.ISO8601Date:
      type: object
      properties:
        time.Time:
          type: string
    internal_booking.CancellationIntent:
      type: object
      properties:
        cancelled_by_user_id:
          type: string
        fee_override_reason:
          type: string
          example: Loyalty member
        fee_pence:
          type: integer
          example: 5000
        reason_code:
          type: string
          example: guest_request
        refund_action:
          allOf:
            - $ref: "#/components/schemas/internal_booking.RefundAction"
          example: original
        waive_fee:
          type: boolean
          example: false
    internal_booking.CreateReservationInput:
      type: object
    internal_booking.GuestInlinePayload:
      type: object
      properties:
        email:
          type: string
          example: jane.doe@example.com
        first_name:
          type: string
          example: Jane
        id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
        last_name:
          type: string
          example: Doe
        phone:
          type: string
          example: "+441234567890"
    internal_booking.GuestResponse:
      type: object
      properties:
        email:
          type: string
          example: jane@example.com
        first_name:
          type: string
          example: Jane
        id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
        last_name:
          type: string
          example: Doe
        phone:
          type: string
          example: "+441234567890"
        property_id:
          type: string
    internal_booking.ItemResponse:
      type: object
      properties:
        adults_count:
          type: integer
          example: 2
        assigned_room_id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
        base_rate_pence:
          type: integer
          example: 15000
        booked_room_type_id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
        children_count:
          type: integer
          example: 0
        created_at:
          type: string
        deleted_at:
          type: string
        do_not_move:
          type: boolean
          example: false
        guest_id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
        id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
        property_id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
        rate_plan_id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
        reservation_id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
        status:
          allOf:
            - $ref: "#/components/schemas/internal_booking.ItemStatus"
          example: booked
        stay_period:
          type: string
        updated_at:
          type: string
        version:
          type: integer
          example: 1
    internal_booking.ItemStatus:
      type: string
      enum:
        - booked
        - checked_in
        - checked_out
        - no_show
        - overstay
        - cancelled
        - archived
      x-enum-varnames:
        - ItemStatusBooked
        - ItemStatusCheckedIn
        - ItemStatusCheckedOut
        - ItemStatusNoShow
        - ItemStatusOverstay
        - ItemStatusCancelled
        - ItemStatusArchived
    internal_booking.RefundAction:
      type: string
      enum:
        - none
        - original
        - credit
      x-enum-varnames:
        - RefundNone
        - RefundOriginal
        - RefundCredit
    internal_booking.ReservationResponse:
      type: object
      properties:
        cancellation_intent:
          $ref: "#/components/schemas/internal_booking.CancellationIntent"
        code:
          type: string
          example: RES-111213
        created_at:
          type: string
        deleted_at:
          type: string
        expires_at:
          type: string
        group_id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
        guest:
          $ref: "#/components/schemas/internal_booking.GuestResponse"
        id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
        items:
          type: array
          items:
            $ref: "#/components/schemas/internal_booking.ItemResponse"
        notes:
          type: string
          example: Guest requested top floor
        primary_guest_id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
        property_id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
        sequential:
          type: integer
          example: 42
        source:
          allOf:
            - $ref: "#/components/schemas/internal_booking.ReservationSource"
          example: internal
        status:
          allOf:
            - $ref: "#/components/schemas/internal_booking.ReservationStatus"
          example: hold
        stay_period_envelope:
          type: string
        travel_agent_id:
          type: string
          example: 00000000-0000-0000-0000-000000000000
        updated_at:
          type: string
        version:
          type: integer
          example: 1
    internal_booking.ReservationSource:
      type: string
      enum:
        - website
        - internal
        - ota
      x-enum-varnames:
        - SourceWebsite
        - SourceInternal
        - SourceOTA
    internal_booking.ReservationStatus:
      type: string
      enum:
        - hold
        - confirmed
        - checked_in
        - checked_out
        - pending_cancellation
        - cancelled
        - archived
      x-enum-varnames:
        - StatusHold
        - StatusConfirmed
        - StatusCheckedIn
        - StatusCheckedOut
        - StatusPendingCancellation
        - StatusCancelled
        - StatusArchived
