        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/internal_booking.BatchResult"
        "207":
          description: Partial success (some items failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/internal_booking.BatchResult"
        "400":
          description: Invalid ID or X-Property-ID
          content:
